################################################################################
# How to create a tag to launch the workflow
# git tag -a "0.1.0" -m "Release v0.1.0"
# git push origin --tags
################################################################################
# WARNING: Make sure to set action permissions to max ("Read and write permissions")
name: Build/Release
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  synthesis:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        core: ["main", "pal", "spc", "sa1", "cx4", "pal_sa1", "pal_cx4"]
      fail-fast: false

    steps:
      - name: "🧰 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🧰 Checkout Packybara"
        uses: actions/checkout@v4
        with:
          repository: "agg23/pocketpublish"
          path: ".github/publish"

      - name: "🧹 Free disk space"
        run: |
          # The Quartus image unpacks to ~20GB; default runner disk is too small
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h /

      - name: "🏗️ Compile design"
        shell: bash
        run: |
          map_value() {
              case "$1" in
                  main)
                      echo "ntsc"
                      ;;
                  pal)
                      echo "pal"
                      ;;
                  spc)
                      echo "ntsc_spc"
                      ;;
                  sa1)
                      echo "ntsc_sa1"
                      ;;
                  cx4)
                      echo "ntsc_cx4"
                      ;;
                  pal_sa1)
                      echo "pal_sa1"
                      ;;
                  pal_cx4)
                      echo "pal_cx4"
                      ;;
                  *)
                      echo "Unknown input"
                      ;;
              esac
          }

          build_type=$(map_value "${{ matrix.core }}")
          cmd="docker run --rm -v ${{ github.workspace }}:/build ghcr.io/drizzt/quartus:21.1 quartus_sh -t generate.tcl $build_type"
          echo "Running command: $cmd"
          eval $cmd

      - name: Upload failure artifact
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure_output_files_${{ matrix.core }}
          path: projects/output_files/

      - name: Reverse bitstream
        shell: bash
        run: |
          mkdir artifacts
          pip3 install -r .github/publish/requirements.txt
          python3 .github/publish/reverse.py projects/output_files/snes_pocket.rbf artifacts/snes_${{ matrix.core }}.rev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snes_${{ matrix.core }}
          path: artifacts/snes_${{ matrix.core }}.rev

  packaging:
    runs-on: ubuntu-latest
    needs: synthesis
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: "🧰 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🧰 Checkout Packybara"
        uses: actions/checkout@v4
        with:
          repository: "agg23/pocketpublish"
          path: ".github/publish"

      # pocketpublish derives the version from GITHUB_REF (branch name = "master"),
      # ignoring the version in gateware.json/core.json. Feed it a synthetic tag ref
      # so core.json and the release filenames carry the build date instead.
      - name: "Stamp version"
        run: echo "GITHUB_REF=refs/tags/$(date -u +%Y.%m.%d)" >> "$GITHUB_ENV"

      - name: "Create folders"
        run: |
          pip3 install -r .github/publish/requirements.txt
          python3 .github/publish/create_folders.py

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging/Cores/agg23.SNES_experimental/
          merge-multiple: true

      - name: "Release"
        run: python3 .github/publish/release.py --norelease

      - name: "Publish nightly"
        if: github.event_name != 'pull_request'
        run: |
          gh release delete nightly --cleanup-tag -y || true
          gh release create nightly release/*.zip \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Experimental nightly ($(date -u +%Y-%m-%d) ${GITHUB_SHA::7})" \
            --notes "Rolling build of master @ ${GITHUB_SHA::7}. Auto-generated."

      - name: "Upload Actions artifact"
        uses: actions/upload-artifact@v4
        with:
          # This must always be wrapped in an outer zip, so give it a name that makes sense
          name: "agg23.SNES_experimental"
          path: release/*.zip
