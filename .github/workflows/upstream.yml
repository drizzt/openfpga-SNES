name: Sync Upstream
on:
  workflow_dispatch:
  schedule:
    # Run at midnight UTC daily
    - cron: "0 0 * * *"

jobs:
  pr-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.CUSTOM_GH_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "https://user:${{ secrets.CUSTOM_GH_TOKEN }}@github.com" > /home/runner/.git-credentials
          git config --global credential.helper store

      - name: "Copybara"
        id: copybara
        run: |
          # Allow us to capture the Docker exit code
          set +e
          /usr/bin/docker run \
          -v "$(pwd)":/usr/src/app \
          -v /home/runner/.ssh/known_hosts:/root/.ssh/known_hosts \
          -v /home/runner/.gitconfig:/root/.gitconfig \
          -v /home/runner/.git-credentials:/root/.git-credentials \
          ghcr.io/anipos/copybara-docker-image \
          --ignore-noop migrate /usr/src/app/.github/copy.bara.sky
          EXIT_CODE=$?
          set -e
          # Exit code 4 means no changes to migrate; anything else non-zero is a failure
          if [ $EXIT_CODE -eq 4 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: "Auto-merge sync PR"
        if: steps.copybara.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CUSTOM_GH_TOKEN }}
        run: gh pr merge vendor/upstream-sync --auto --squash --delete-branch
